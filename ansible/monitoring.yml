---
- name: Setup K3s and Deploy Application
  hosts: all
  become: true # Run as root
  tasks:
    - name: Install K3s (Lightweight Kubernetes)
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure .kube directory exists for ubuntu user
      file:
        path: /home/ubuntu/.kube
        state: directory
        owner: ubuntu
        mode: '0755'

    - name: Copy K3s kubeconfig to ubuntu user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ubuntu/.kube/config
        remote_src: yes
        owner: ubuntu
        mode: '0600'

    - name: Copy updated Kubernetes manifests from Jenkins to EC2
      copy:
        src: ../k8s/
        dest: /home/ubuntu/k8s/
        owner: ubuntu

    - name: Deploy the Application to K3s
      become_user: ubuntu
      command: kubectl apply -f /home/ubuntu/k8s/