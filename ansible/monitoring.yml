---
- name: Setup K3s and Deploy Application
  hosts: all
  become: true
  vars:
    ansible_user: ubuntu

  pre_tasks:
    - name: Wait for system to become reachable
      wait_for_connection:
        timeout: 60

    - name: Install Python3 on Minimal Image
      raw: apt-get update && apt-get install -y python3
      changed_when: false

  tasks:
    - name: Install K3s (Lightweight Kubernetes)
      shell: curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s
      # K3S_KUBECONFIG_MODE ensures the config is readable for the next steps
      environment:
        K3S_KUBECONFIG_MODE: "644"

    - name: Ensure .kube directory exists
      file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy K3s kubeconfig to user
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "/home/{{ ansible_user }}/.kube/config"
        remote_src: yes
        owner: "{{ ansible_user }}"
        mode: '0600'

    - name: Update kubeconfig to point to localhost
      replace:
        path: "/home/{{ ansible_user }}/.kube/config"
        regexp: '127.0.0.1'
        replace: 'localhost'

    - name: Create k8s directory for manifests
      file:
        path: "/home/{{ ansible_user }}/k8s"
        state: directory
        owner: "{{ ansible_user }}"

    - name: Copy Kubernetes manifests
      copy:
        src: ../k8s/ # Ensure this path is relative to where you run ansible-playbook
        dest: "/home/{{ ansible_user }}/k8s/"
        owner: "{{ ansible_user }}"

    - name: Deploy the Application to K3s
      become_user: "{{ ansible_user }}"
      shell: |
        export KUBECONFIG=/home/{{ ansible_user }}/.kube/config
        /usr/local/bin/kubectl apply -f /home/{{ ansible_user }}/k8s/