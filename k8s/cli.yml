---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seyoawe-cli-deployment
  labels:
    app: seyoawe-cli
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seyoawe-cli
  template:
    metadata:
      labels:
        app: seyoawe-cli
    spec:
      containers:
      - name: cli
        image: python:3.11-slim
        cpu: "250m"
        # This downloads git, installs your CLI wheel directly from the repository, and keeps the pod awake
        command: ["/bin/sh", "-c"]
        args:
          - |
            apt-get update && apt-get install -y git
            pip install git+https://github.com/YOUR_GIT_USERNAME/YOUR_REPO_NAME.git#subdirectory=cli
            echo "CLI installed successfully! Sleeping forever to keep pod alive..."
            sleep infinity