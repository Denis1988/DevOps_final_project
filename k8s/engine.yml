---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seyoawe-engine
  labels:
    app: seyoawe-engine
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: seyoawe-engine
  template:
    metadata:
      labels:
        app: seyoawe-engine
    spec:
      containers:
      - name: seyoawe-engine-container
        # Uses the image generated by your Jenkins Engine CI phase
        image: denis1988/seyoawe-engine:latest 
        imagePullPolicy: Always
        resources:
          limits:
            cpu: "500m" 
        ports:
        - containerPort: 5000 
---
apiVersion: v1
kind: Service
metadata:
  name: seyoawe-engine-svc 
spec:
  selector:
    app: seyoawe-engine
  ports:
    - protocol: TCP
      port: 8080           # The port the CLI connects to
      targetPort: 5000     # The port your Flask app actually listens on